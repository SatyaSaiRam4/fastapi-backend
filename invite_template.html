<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
    }

    h1 {
      color: #2563eb;
    }

    .button {
      display: inline-block;
      padding: 12px 20px;
      background: #2563eb;
      color: white !important;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 20px;
    }

    .footer {
      margin-top: 30px;
      color: gray;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Welcome to FastAPI Project 🚀</h1>

  <p>Hello {{name}},</p>

  <p>
    You have been invited to join our platform.
  </p>

  <p>
    Click below to access the application.
  </p>

  <a class="button" href="{{link}}">
    Open Application
  </a>

  <div class="footer">
    FastAPI + Supabase + Render + Vercel
  </div>
</div>

</body>
</html>
